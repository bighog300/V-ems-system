<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V-EMS — Support / Admin Diagnostics</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .diag-section { margin-bottom: 1.5rem; }
      .diag-section h2 { margin: 0 0 0.75rem; font-size: 1.1rem; }
      .diag-dl { display: grid; grid-template-columns: 260px 1fr; gap: 0.3rem 0.75rem; margin: 0; }
      .diag-dl dt { font-weight: bold; }
      .diag-empty { color: #6b7280; font-style: italic; margin: 0.5rem 0; }
      .diag-ok-note { color: #166534; font-style: normal; font-weight: 600; }
      .diag-generated-at { color: #6b7280; font-size: 0.85rem; margin-bottom: 1rem; }
      .diag-badge-ok { background: #dcfce7; color: #166534; border-radius: 999px; padding: 0.1rem 0.5rem; font-size: 0.85rem; font-weight: 700; display: inline-block; }
      .diag-badge-warn { background: #fef3c7; color: #92400e; border-radius: 999px; padding: 0.1rem 0.5rem; font-size: 0.85rem; font-weight: 700; display: inline-block; }
      .diag-badge-error { background: #fee2e2; color: #991b1b; border-radius: 999px; padding: 0.1rem 0.5rem; font-size: 0.85rem; font-weight: 700; display: inline-block; }
      .diag-badge-neutral { background: #e5e7eb; color: #374151; border-radius: 999px; padding: 0.1rem 0.5rem; font-size: 0.85rem; font-weight: 700; display: inline-block; }
      .diag-table-wrap { overflow-x: auto; margin-top: 1rem; }
      .diag-table { border-collapse: collapse; width: 100%; font-size: 0.875rem; }
      .diag-table th, .diag-table td { border: 1px solid #d1d5db; padding: 0.4rem 0.6rem; text-align: left; vertical-align: top; }
      .diag-table th { background: #f3f4f6; font-weight: 700; }
      .diag-error-cell { max-width: 280px; word-break: break-word; color: #b91c1c; }
      .diag-access-denied { background: #fee2e2; border: 1px solid #f87171; border-radius: 6px; padding: 1rem; color: #991b1b; font-weight: 600; }
    </style>
  </head>
  <body>
    <main>
      <h1>Support / Admin Diagnostics</h1>
      <p class="hint">Read-only operational diagnostics for support and admin roles. Requires supervisor, operations_manager, or sys_admin role when RBAC is enabled.</p>

      <section class="panel controls">
        <label>
          API Base URL
          <input id="apiBaseUrl" value="http://127.0.0.1:8080" />
        </label>
        <label>
          Bearer Token
          <input id="authToken" type="password" autocomplete="off" placeholder="Paste JWT/OAuth bearer token" />
        </label>
        <details data-dev-only>
          <summary>Development identity headers</summary>
        <label>
          Actor ID
          <input id="actorId" value="STAFF-OPS-1" />
        </label>
        <label>
          Actor Role
          <select id="actorRole">
            <option value="sys_admin">sys_admin</option>
            <option value="operations_manager">operations_manager</option>
            <option value="supervisor">supervisor</option>
            <option value="dispatcher">dispatcher</option>
            <option value="field_crew">field_crew</option>
            <option value="anonymous">anonymous</option>
          </select>
        </label>
        </details>
        <button id="loadDiagnostics">Load Diagnostics</button>
        <label>
          Auto Refresh (30s)
          <input id="diagAutoRefresh" type="checkbox" />
        </label>
      </section>

      <p id="diagStatus" aria-live="polite"></p>
      <div id="diagOutput"></div>
      <p><a href="./index.html">&larr; Back to Web Control</a></p>
    </main>

    <script type="module">
      import { loadDiagnosticsData, buildDiagnosticsSections, renderDiagnosticsHtml } from "./diagnostics.mjs";
      import { applyProductionUiMode, readSessionFromDom } from "./session.mjs";
      import { handleAppError, startPolling } from "./runtime.mjs";

      const output = document.querySelector("#diagOutput");
      const statusEl = document.querySelector("#diagStatus");
      const polling = startPolling({
        enabled: () => Boolean(document.querySelector("#diagAutoRefresh").checked),
        intervalMs: 30000,
        onTick: () => renderDiagnostics({ reason: "auto" })
      });

      async function renderDiagnostics({ reason = "manual" } = {}) {
        const config = readSessionFromDom({ includeIncidentId: false });
        if (!config.apiBaseUrl) {
          statusEl.textContent = "API Base URL is required.";
          return;
        }
        if (reason === "manual") statusEl.textContent = "Loading diagnostics...";

        try {
          const data = await loadDiagnosticsData(config);
          const sections = buildDiagnosticsSections(data);
          output.innerHTML = renderDiagnosticsHtml(sections);
          statusEl.textContent = reason === "auto"
            ? `Auto-refreshed at ${new Date().toLocaleTimeString()}.`
            : "Diagnostics loaded.";
        } catch (err) {
          const errorResult = handleAppError(err, {
            statusEl,
            outputEl: output,
            fallbackPrefix: "Diagnostics load failed."
          });
          if (errorResult.authFailure) {
            polling.stop();
          }
        }
      }

      document.querySelector("#loadDiagnostics").addEventListener("click", () => void renderDiagnostics());
      document.querySelector("#diagAutoRefresh").addEventListener("change", () => {
        polling.start();
        void renderDiagnostics();
      });

      applyProductionUiMode();
      polling.start();
      void renderDiagnostics();
    </script>
  </body>
</html>
