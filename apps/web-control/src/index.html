<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V-EMS Web Control - Crew Mobile Slice</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>Web Control - Crew Job List & Incident Detail</h1>
      <p class="hint">First crew-facing UI slice for operational field visibility and clinical action entry points.</p>
      <p class="hint"><a href="./diagnostics.html">Support / Admin Diagnostics &rarr;</a></p>

      <section class="panel controls">
        <label>
          API Base URL
          <input id="apiBaseUrl" value="http://127.0.0.1:8080" />
        </label>
        <label>
          Actor ID
          <input id="actorId" value="STAFF-001" />
        </label>
        <label>
          Actor Role
          <select id="actorRole">
            <option value="dispatcher">dispatcher</option>
            <option value="field_crew">field_crew</option>
            <option value="field_crew_lead">field_crew_lead</option>
            <option value="clinical_reviewer">clinical_reviewer</option>
            <option value="supervisor">supervisor</option>
            <option value="sys_admin">sys_admin</option>
          </select>
        </label>
        <button id="loadDispatcherBoard">Load Dispatcher Board</button>
        <button id="loadBoard">Load Crew Job List</button>
      </section>

      <section class="panel controls">
        <label>
          Active Only
          <input id="boardFilterActive" type="checkbox" />
        </label>
        <label>
          Status
          <select id="boardFilterStatus">
            <option value="all">All statuses</option>
            <option value="Awaiting Dispatch">Awaiting Dispatch</option>
            <option value="Assigned">Assigned</option>
            <option value="Crew Acknowledged">Crew Acknowledged</option>
            <option value="En Route">En Route</option>
            <option value="On Scene">On Scene</option>
            <option value="Transporting">Transporting</option>
            <option value="At Destination">At Destination</option>
            <option value="Handover Complete">Handover Complete</option>
            <option value="Closed">Closed</option>
            <option value="Cancelled">Cancelled</option>
            <option value="Stood Down">Stood Down</option>
          </select>
        </label>
        <label>
          Priority
          <select id="boardFilterPriority">
            <option value="all">All priorities</option>
            <option value="critical">critical</option>
            <option value="high">high</option>
            <option value="medium">medium</option>
            <option value="low">low</option>
          </select>
        </label>
        <label>
          Sort
          <select id="boardSortBy">
            <option value="priority">Priority</option>
            <option value="recency">Recency</option>
          </select>
        </label>
        <label>
          Auto Refresh (15s)
          <input id="boardAutoRefresh" type="checkbox" checked />
        </label>
      </section>

      <section class="panel controls">
        <label>
          Incident ID
          <input id="incidentId" placeholder="INC-000001" />
        </label>
        <button id="loadCrewIncident">Load Crew Incident Detail</button>
        <button id="loadIncident">Load Operational Summary</button>
      </section>

      <p id="status" aria-live="polite"></p>
      <div id="dispatcherBoardOutput"></div>
      <div id="crewJobOutput"></div>
      <div id="crewIncidentOutput"></div>
      <div id="incidentOutput"></div>
    </main>

    <script type="module" src="./main.mjs"></script>
  </body>
</html>
