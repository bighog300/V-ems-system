<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V-EMS Web Control - Incident Detail</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>Web Control - Incident Detail</h1>
      <p class="hint">Operational view for incident detail and closure-readiness context.</p>

      <section class="panel controls">
        <label>
          API Base URL
          <input id="apiBaseUrl" value="http://127.0.0.1:8080" />
        </label>
        <label>
          Incident ID
          <input id="incidentId" placeholder="INC-000001" />
        </label>
        <button id="loadIncident">Load Incident</button>
      </section>

      <p id="status" aria-live="polite"></p>
      <div id="incidentOutput"></div>
    </main>

    <script type="module" src="./main.mjs"></script>
  </body>
</html>
