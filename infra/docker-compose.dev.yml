services:
  mysql:
    image: mysql:8.0
    container_name: vems-mysql-dev
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./services/mysql/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - vems-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: vems-redis-dev
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - vems-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  vtiger:
    build:
      context: ./services/vtiger
      dockerfile: Dockerfile
    container_name: vems-vtiger-dev
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${VTIGER_PORT:-8080}:80"
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${VTIGER_DB_USER:-vtiger}
      DB_PASSWORD: ${VTIGER_DB_PASSWORD:-vtigerpass}
      DB_NAME: ${VTIGER_DB_NAME:-vtiger}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      VTIGER_ADMIN_USER: ${VTIGER_ADMIN_USER:-admin}
      VTIGER_ADMIN_PASSWORD: ${VTIGER_ADMIN_PASSWORD:-Admin@123}
      VTIGER_ADMIN_EMAIL: ${VTIGER_ADMIN_EMAIL:-admin@example.com}
      VTIGER_COMPANY_NAME: ${VTIGER_COMPANY_NAME:-VEMS Dev}
      VTIGER_TIMEZONE: ${VTIGER_TIMEZONE:-UTC}
      VTIGER_CURRENCY: ${VTIGER_CURRENCY:-USD}
      VTIGER_LANGUAGE: ${VTIGER_LANGUAGE:-en_us}
      VTIGER_SITE_URL: ${VTIGER_SITE_URL:-http://localhost:8080}
      RBAC_ENFORCE: ${VTIGER_RBAC_ENFORCE:-false}
    volumes:
      - vtiger_data_dev:/var/www/html
    networks:
      - vems-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  openemr:
    build:
      context: ./services/openemr
      dockerfile: Dockerfile
    container_name: vems-openemr-dev
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${OPENEMR_PORT:-8081}:80"
    environment:
      MYSQL_HOST: ${DB_HOST:-mysql}
      MYSQL_PORT: 3306
      MYSQL_USER: ${OPENEMR_DB_USER:-openemr}
      MYSQL_PASSWORD: ${OPENEMR_DB_PASSWORD:?OPENEMR_DB_PASSWORD is required}
      MYSQL_DATABASE: ${OPENEMR_DB_NAME:-openemr}
      OPENEMR_ADMIN_USER: ${OPENEMR_ADMIN_USER:-admin}
      OPENEMR_ADMIN_PASSWORD: ${OPENEMR_ADMIN_PASSWORD:?OPENEMR_ADMIN_PASSWORD is required}
      REDIS_HOST: ${REDIS_HOST:-redis}
      RBAC_ENFORCE: ${OPENEMR_RBAC_ENFORCE:-false}
    volumes:
      - openemr_data_dev:/var/www/localhost/htdocs/openemr
    networks:
      - vems-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vems-network:

volumes:
  mysql_data_dev:
  redis_data_dev:
  vtiger_data_dev:
  openemr_data_dev:
