  vtiger:
    build:
      context: ./services/vtiger
      dockerfile: Dockerfile
    container_name: vems-vtiger-staging
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8082:80"
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: 3306
      DB_USER: ${VTIGER_DB_USER:-vtiger}
      DB_PASSWORD: ${VTIGER_DB_PASSWORD:?VTIGER_DB_PASSWORD is required}
      DB_NAME: ${VTIGER_DB_NAME:-vtiger}
      VTIGER_ADMIN_USER: ${VTIGER_ADMIN_USER:-admin}
      VTIGER_ADMIN_PASSWORD: ${VTIGER_ADMIN_PASSWORD:?VTIGER_ADMIN_PASSWORD is required}
      VTIGER_SITE_URL: ${VTIGER_SITE_URL_STAGING:-http://localhost:8082}
      RBAC_ENFORCE: "true"
    volumes:
      - vtiger_data_staging:/var/www/html
    networks:
      - vems-network-staging
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  openemr:
    build:
      context: ./services/openemr
      dockerfile: Dockerfile
    container_name: vems-openemr-staging
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8083:80"
    environment:
      MYSQL_HOST: ${DB_HOST:-mysql}
      MYSQL_PORT: 3306
      MYSQL_USER: ${OPENEMR_DB_USER:-openemr}
      MYSQL_PASSWORD: ${OPENEMR_DB_PASSWORD:?OPENEMR_DB_PASSWORD is required}
      MYSQL_DATABASE: ${OPENEMR_DB_NAME:-openemr}
      OPENEMR_ADMIN_USER: ${OPENEMR_ADMIN_USER:-admin}
      OPENEMR_ADMIN_PASSWORD: ${OPENEMR_ADMIN_PASSWORD:?OPENEMR_ADMIN_PASSWORD is required}
      REDIS_HOST: ${REDIS_HOST:-redis}
      RBAC_ENFORCE: "true"
    volumes:
      - openemr_data_staging:/var/www/localhost/htdocs/openemr
    networks:
      - vems-network-staging
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
